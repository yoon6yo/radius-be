apiVersion: apps/v1
kind: Deployment
metadata:
  name: radius-signaling
  namespace: radius
spec:
  replicas: 2
  selector:
    matchLabels:
      app: radius-signaling
  template:
    metadata:
      labels:
        app: radius-signaling
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: signaling
          image: ghcr.io/yoon6yo/radius-be:latest
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: RATE_LIMIT_WINDOW_MS
              value: "600000"
            - name: RATE_LIMIT_MAX_REQUESTS
              value: "20"
            - name: STUN_URLS
              value: "stun:stun.l.google.com:19302,stun:stun1.l.google.com:19302"
            - name: CORS_ORIGIN
              valueFrom:
                secretKeyRef:
                  name: radius-signaling-secret
                  key: cors-origin
            # TURN 설정 옵션: coturn 운영 시 radius-signaling-secret에 키 추가
            - name: TURN_URL
              valueFrom:
                secretKeyRef:
                  name: radius-signaling-secret
                  key: turn-url
                  optional: true
            - name: TURN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: radius-signaling-secret
                  key: turn-username
                  optional: true
            - name: TURN_CREDENTIAL
              valueFrom:
                secretKeyRef:
                  name: radius-signaling-secret
                  key: turn-credential
                  optional: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
