apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: radius-ingress
  namespace: radius
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Socket.io WebSocket 연결 유지를 위한 타임아웃 설정
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    # Socket.io long-polling fallback을 위한 sticky session
    # Redis Adapter를 사용하므로 WebSocket 연결은 sticky session 불필요하지만
    # 초기 polling handshake 단계에서는 동일 Pod로 라우팅되어야 함
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/session-cookie-name: "INGRESSCOOKIE"
    nginx.ingress.kubernetes.io/session-cookie-max-age: "172800"
spec:
  tls:
    - hosts:
        - api.PLACEHOLDER_DOMAIN  # 실제 도메인으로 변경
      secretName: radius-tls
  rules:
    - host: api.PLACEHOLDER_DOMAIN  # 실제 도메인으로 변경
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: radius-signaling
                port:
                  number: 80
